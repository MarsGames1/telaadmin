<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finalizar compra - MarsGames</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://sdk.mercadopago.com/js/v2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#00ff55;--green2:#00cc44;--mars:#e8421a;--orange:#ff6b2b;--gold:#ffb800;}
body{-webkit-tap-highlight-color:transparent;background:#07070c;color:#fff;font-family:'Montserrat',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,255,85,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,85,.02) 1px,transparent 1px);background-size:48px 48px;z-index:0;}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,255,85,.3)}50%{box-shadow:0 0 0 8px rgba(0,255,85,0)}}

.card{position:relative;z-index:1;background:#0f0f16;border:1px solid rgba(0,255,85,.11);border-radius:28px;padding:40px;width:100%;max-width:460px;animation:fadeUp .45s ease both;box-shadow:0 40px 100px rgba(0,0,0,.85);}
.card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:2px;background:linear-gradient(to right,transparent,var(--green),transparent);border-radius:0 0 4px 4px;}

/* HEADER */
.logo{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;margin-bottom:4px;}
.logo span{color:var(--green)}
.sub-title{font-size:11px;color:#444;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;}

/* RESUMO DO PEDIDO */
.resumo{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px 18px;margin-bottom:24px;}
.resumo-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:12px;}
.item-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.item-row:last-of-type{border-bottom:none}
.item-img{width:40px;height:40px;border-radius:8px;object-fit:cover;background:#1a1a28;flex-shrink:0;}
.item-nome{flex:1;font-size:11px;font-weight:700;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-preco{font-size:12px;font-weight:900;color:var(--green);white-space:nowrap;}
.total-row{display:flex;justify-content:space-between;align-items:center;padding-top:12px;margin-top:4px;border-top:1px solid rgba(255,255,255,.08);}
.total-label{font-size:10px;font-weight:700;color:#555;letter-spacing:1px;text-transform:uppercase;}
.total-valor{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--green);}

/* METODOS */
.metodos-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:12px;}

.metodo{position:relative;display:flex;align-items:center;gap:16px;padding:18px 20px;border:1.5px solid rgba(255,255,255,.07);border-radius:16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s,background .2s;}
.metodo:hover:not(.disabled){border-color:rgba(0,255,85,.3);background:rgba(0,255,85,.03);}
.metodo.selected{border-color:var(--green);background:rgba(0,255,85,.05);}
.metodo.disabled{opacity:.35;cursor:not-allowed;}

.metodo-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;line-height:1;}
.metodo-icon.pix{background:rgba(0,255,85,.08);border:1px solid rgba(0,255,85,.15);}
.metodo-icon.card{background:rgba(91,154,246,.08);border:1px solid rgba(91,154,246,.15);}

.metodo-info{flex:1;min-width:0;}
.metodo-nome{font-size:13px;font-weight:900;color:#eee;margin-bottom:3px;}
.metodo-desc{font-size:11px;color:#555;font-weight:600;line-height:1.4;}

.metodo-badge{font-size:9px;font-weight:900;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:99px;}
.metodo-badge.instant{background:rgba(0,255,85,.1);color:var(--green);border:1px solid rgba(0,255,85,.2);}
.metodo-badge.soon{background:rgba(255,255,255,.04);color:#444;border:1px solid rgba(255,255,255,.06);}

.metodo-radio{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.15);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .2s;}
.metodo.selected .metodo-radio{border-color:var(--green);}
.metodo-radio-dot{width:8px;height:8px;border-radius:50%;background:var(--green);transform:scale(0);transition:transform .2s;}
.metodo.selected .metodo-radio-dot{transform:scale(1);}

/* BOTÃO PRINCIPAL */
.btn-pagar{width:100%;padding:16px;border-radius:14px;background:linear-gradient(135deg,var(--green),var(--green2));border:none;color:#000;font-family:'Montserrat',sans-serif;font-weight:900;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:box-shadow .2s,transform .15s,opacity .2s;box-shadow:0 4px 24px rgba(0,255,85,.2);margin-top:8px;display:flex;align-items:center;justify-content:center;gap:10px;}
.btn-pagar:hover:not(:disabled){box-shadow:0 8px 36px rgba(0,255,85,.38);transform:translateY(-2px);}
.btn-pagar:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.btn-pagar .spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:none;}
.btn-pagar.loading .spinner{display:block;}
.btn-pagar.loading .btn-txt{display:none;}

/* SEGURANÇA */
.seguranca{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:16px;font-size:10px;color:#333;font-weight:600;}
/* Cupom */
.cupom-wrap{margin-bottom:20px;}
.cupom-row{display:flex;gap:8px;margin-bottom:6px;}
.cupom-input{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:10px 14px;color:#fff;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:600;outline:none;transition:border-color .2s;}
.cupom-input:focus{border-color:rgba(232,66,26,.4);}
.cupom-input::placeholder{color:#333;}
.cupom-btn{padding:10px 16px;border-radius:10px;border:1px solid rgba(232,66,26,.35);background:rgba(232,66,26,.1);color:#e8421a;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:900;letter-spacing:.5px;cursor:pointer;white-space:nowrap;transition:background .2s;}
.cupom-btn:hover{background:rgba(232,66,26,.2);}
.cupom-status{display:none;font-size:10px;font-weight:700;padding:6px 10px;border-radius:8px;}
.cupom-status.ok{background:rgba(0,255,85,.08);border:1px solid rgba(0,255,85,.2);color:#00ff55;}
.cupom-status.erro{background:rgba(232,66,26,.08);border:1px solid rgba(232,66,26,.2);color:#ff6b4a;}
.desconto-row{display:none;justify-content:space-between;align-items:center;margin-bottom:8px;padding:0 2px;}
.desconto-lbl{font-size:10px;font-weight:700;color:var(--green);}
.desconto-val{font-size:13px;font-weight:900;color:var(--green);}
/* Card Brick */
#card-brick-wrap{margin-top:12px;overflow:hidden;}
#cardBrick_container{max-width:100%;overflow:hidden;}
#cardBrick_container iframe{max-width:100%!important;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a28;border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 20px;font-size:12px;font-weight:700;color:#eee;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:480px){
  .card{padding:28px 20px;border-radius:20px;}
  .logo{font-size:18px;}
  .total-valor{font-size:18px;}
  .metodo{padding:14px 16px;gap:12px;}
  .metodo-icon{width:38px;height:38px;font-size:18px;}
  .metodo-nome{font-size:12px;}
  .btn-pagar{padding:14px;font-size:12px;}
  .item-nome{font-size:10px;}
  .item-preco{font-size:11px;}
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">Mars<span>Games</span></div>
  <div class="sub-title">Finalizar compra</div>

  <!-- RESUMO -->
  <div class="resumo">
    <div class="resumo-title">Resumo do pedido</div>
    <div id="itensList"></div>
    <div class="total-row">
      <div class="total-label">Total</div>
      <div class="total-valor" id="totalValor">R$ 0,00</div>
    </div>
  </div>

  <!-- CUPOM -->
  <div class="cupom-wrap">
    <div class="cupom-row">
      <input class="cupom-input" id="cupomInput" type="text" placeholder="Código de cupom" maxlength="20" autocomplete="off">
      <button class="cupom-btn" id="cupomBtn" onclick="aplicarCupom()">Aplicar</button>
    </div>
    <div class="cupom-status" id="cupomStatus"></div>
  </div>
  <!-- Desconto aplicado -->
  <div class="desconto-row" id="descontoRow">
    <span class="desconto-lbl">Desconto <span id="cupomTag" style="background:rgba(0,255,85,.1);border:1px solid rgba(0,255,85,.2);border-radius:4px;padding:1px 6px;font-size:8px;letter-spacing:.5px;margin-left:4px"></span></span>
    <span class="desconto-val" id="descontoVal"></span>
  </div>

  <!-- MÉTODOS -->
  <div class="metodos-title">Forma de pagamento</div>

  <div class="metodo selected" id="metodo-pix" onclick="selecionarMetodo('pix')">
    <div class="metodo-icon pix">⚡</div>
    <div class="metodo-info">
      <div class="metodo-nome">Pix</div>
      <div class="metodo-desc">QR Code gerado na hora — aprovação instantânea</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
      <span class="metodo-badge instant">Instantâneo</span>
      <div class="metodo-radio"><div class="metodo-radio-dot"></div></div>
    </div>
  </div>

  <div class="metodo" id="metodo-cartao" onclick="selecionarMetodo('cartao')">
    <div class="metodo-icon card" style="font-size:18px">💳</div>
    <div class="metodo-info">
      <div class="metodo-nome">Cartão de crédito ou débito</div>
      <div class="metodo-desc">Até 12x — aprovação na hora</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
      <span class="metodo-badge instant" style="background:rgba(91,154,246,.1);color:#5b9af6;border-color:rgba(91,154,246,.2)">Débito e Crédito</span>
      <div class="metodo-radio"><div class="metodo-radio-dot"></div></div>
    </div>
  </div>

  <!-- Brick do cartão -->
  <div id="card-brick-wrap" style="display:none">
    <div id="cardBrick_container"></div>
  </div>

  <!-- BOTÃO -->
  <button class="btn-pagar" id="btnPagar" onclick="pagar()">
    <div class="spinner"></div>
    <span class="btn-txt">⚡ Pagar com Pix</span>
  </button>

  <div class="seguranca">🔒 Pagamento 100% seguro via Mercado Pago</div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://rzjtlghpsygxkivgwgws.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sDCnL56QQzg976Pt9if_GA_2mZn2Wzm';
const MP_PUBLIC_KEY = 'APP_USR-3c95def7-e1bc-4f2f-a191-b724ea84f28a';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { flowType: 'implicit', detectSessionInUrl: true, persistSession: true, autoRefreshToken: true, storageKey: 'mg_auth' }
});

const itens = JSON.parse(sessionStorage.getItem('mg_itens_pendentes') || '[]');
let cupomAtual = null;
try{ var c=sessionStorage.getItem('mg_cupom'); if(c) cupomAtual=JSON.parse(c); }catch(_){}
let metodoSelecionado = 'pix';
let mpInstance = null;
let cardBrickCtrl = null;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2800);
}

function calcularDesconto(){
  if(!cupomAtual||!itens.length) return 0;
  var precos=itens.map(p=>Number(p.preco));
  var menor=Math.min(...precos);
  if(cupomAtual.desconto_tipo==='percentual') return Math.round(menor*(cupomAtual.desconto_valor/100)*100)/100;
  return Math.min(cupomAtual.desconto_valor, menor);
}

function getTotal(){
  var subtotal=itens.reduce((s,p)=>s+Number(p.preco),0);
  return Math.max(0, subtotal - calcularDesconto());
}

function renderResumo() {
  if (!itens.length) { window.location.href = 'index.html'; return; }
  var subtotal = itens.reduce((s,p)=>s+Number(p.preco),0);
  var desconto = calcularDesconto();
  var total = Math.max(0, subtotal - desconto);

  document.getElementById('itensList').innerHTML = itens.map(p =>
    `<div class="item-row">
      <img class="item-img" src="${esc(p.imagem||'')}" onerror="this.src=''" alt="">
      <div class="item-nome">${esc(p.nome)}</div>
      <div class="item-preco">R$ ${Number(p.preco).toFixed(2).replace('.',',')}</div>
    </div>`
  ).join('');

  /* Linha de desconto */
  var rowDesc = document.getElementById('descontoRow');
  if(desconto > 0 && cupomAtual){
    rowDesc.style.display = 'flex';
    document.getElementById('cupomTag').textContent = cupomAtual.codigo;
    document.getElementById('descontoVal').textContent = '−R$ '+desconto.toFixed(2).replace('.',',');
    document.getElementById('cupomInput').value = cupomAtual.codigo;
    document.getElementById('cupomBtn').textContent = 'Remover';
  }

  document.getElementById('totalValor').textContent = 'R$ ' + total.toFixed(2).replace('.', ',');
}

/* ── CUPOM ── */
async function aplicarCupom(){
  var input = document.getElementById('cupomInput');
  var btn   = document.getElementById('cupomBtn');
  var status= document.getElementById('cupomStatus');
  var codigo= (input.value||'').trim().toUpperCase();
  if(!codigo) return;

  if(cupomAtual){
    cupomAtual=null;
    sessionStorage.removeItem('mg_cupom');
    input.value=''; btn.textContent='Aplicar';
    status.className='cupom-status'; status.style.display='none';
    document.getElementById('descontoRow').style.display='none';
    renderResumo(); return;
  }

  btn.disabled=true; btn.textContent='...'; status.style.display='none';
  try{
    var res=await sb.from('cupons').select('*').eq('codigo',codigo).eq('ativo',true).maybeSingle();
    if(res.error||!res.data){ mostrarErroCupom('Cupom inválido ou expirado.'); btn.disabled=false; btn.textContent='Aplicar'; return; }
    var c=res.data;
    var sess=await sb.auth.getSession();
    if(sess.data&&sess.data.session){
      var email=sess.data.session.user.email;
      var emails_usados=Array.isArray(c.emails_usados)?c.emails_usados:[];
      if(emails_usados.includes(email)){ mostrarErroCupom('Este cupom já foi utilizado pela sua conta.'); btn.disabled=false; btn.textContent='Aplicar'; return; }
    }
    if(c.usos_max&&c.usos_atuais>=c.usos_max){ mostrarErroCupom('Este cupom atingiu o limite de usos.'); btn.disabled=false; btn.textContent='Aplicar'; return; }
    cupomAtual=c;
    sessionStorage.setItem('mg_cupom', JSON.stringify(c));
    btn.textContent='Remover'; btn.disabled=false;
    var desc=c.desconto_tipo==='percentual'?c.desconto_valor+'% OFF':('R$ '+Number(c.desconto_valor).toFixed(2).replace('.',',')+' OFF');
    status.className='cupom-status ok';
    status.innerHTML='✓ Cupom <strong>'+codigo+'</strong> aplicado! '+desc;
    status.style.display='block';
    renderResumo();
    /* Reinicia brick com novo valor */
    if(cardBrickCtrl){ cardBrickCtrl.unmount(); cardBrickCtrl=null; }
    if(metodoSelecionado==='cartao') await initCardBrick();
  }catch(e){ mostrarErroCupom('Erro ao verificar cupom.'); btn.disabled=false; btn.textContent='Aplicar'; }
}

function mostrarErroCupom(msg){
  var status=document.getElementById('cupomStatus');
  status.className='cupom-status erro';
  status.textContent='✕ '+msg;
  status.style.display='block';
  setTimeout(()=>status.style.display='none',3500);
}

/* ── MÉTODO ── */
async function selecionarMetodo(metodo) {
  metodoSelecionado = metodo;
  document.querySelectorAll('.metodo').forEach(el => el.classList.remove('selected'));
  document.getElementById('metodo-' + metodo).classList.add('selected');
  var brickWrap = document.getElementById('card-brick-wrap');
  var btn = document.getElementById('btnPagar');
  var btnTxt = btn.querySelector('.btn-txt');
  if(metodo === 'cartao'){
    brickWrap.style.display = 'block';
    btnTxt.textContent = '💳 Pagar com Cartão';
    await initCardBrick();
  } else {
    brickWrap.style.display = 'none';
    btnTxt.textContent = '⚡ Pagar com Pix';
    if(cardBrickCtrl){ cardBrickCtrl.unmount(); cardBrickCtrl=null; }
  }
}

/* ── MP BRICK ── */
async function initCardBrick(){
  if(cardBrickCtrl) return;
  if(!window.MercadoPago){ showToast('SDK do cartão não carregou. Tente novamente.'); return; }
  if(!mpInstance) mpInstance = new MercadoPago(MP_PUBLIC_KEY, {locale:'pt-BR'});
  var total = getTotal();
  /* Mercado Pago rejeita valores abaixo de R$ 1,00 no Brick */
  if(total < 1){
    document.getElementById('card-brick-wrap').innerHTML=
      '<div style="padding:20px;text-align:center;background:rgba(255,100,0,.06);border:1px solid rgba(255,100,0,.2);border-radius:12px;font-size:12px;color:#ff8844;font-weight:600">'+
      '⚠️ Pagamento com cartão requer valor mínimo de R$ 1,00.<br><span style="color:#555;font-size:11px;margin-top:4px;display:block">Use Pix para valores menores.</span></div>';
    return;
  }
  var sess = await sb.auth.getSession();
  var email = (sess.data&&sess.data.session&&sess.data.session.user&&sess.data.session.user.email)||'';
  var bricks = mpInstance.bricks();
  try{
    cardBrickCtrl = await bricks.create('cardPayment','cardBrick_container',{
      initialization:{ amount: total, payer:{email:email} },
      customization:{
        visual:{style:{theme:'dark'}},
        paymentMethods:{ maxInstallments:12 }
      },
      callbacks:{
        onReady: function(){
          /* Quando pronto, ajusta o min-height para o tamanho real do formulário */
          var wrap=document.getElementById('card-brick-wrap');
          if(wrap) wrap.style.minHeight='0';
        },
        onSubmit: async function(cardData){ await pagarCartao(cardData); },
        onError: function(err){
          if(err&&err.cause&&err.cause[0]&&err.cause[0].code==='E301') return;
          if(err&&(err.type==='non_critical'||err.type==='validation')) return;
          /* Erro crítico — mostra mensagem e reseta */
          var wrap=document.getElementById('card-brick-wrap');
          if(wrap) wrap.innerHTML='<div style="padding:20px;text-align:center;background:rgba(255,50,50,.06);border:1px solid rgba(255,50,50,.2);border-radius:12px;font-size:12px;color:#ff6666;font-weight:600">❌ Erro ao carregar formulário de cartão.<br><button onclick="cardBrickCtrl=null;document.getElementById(\'cardBrick_container\').innerHTML=\'\';initCardBrick()" style="margin-top:10px;padding:8px 16px;border-radius:8px;border:1px solid rgba(255,100,100,.3);background:rgba(255,50,50,.1);color:#ff8888;font-size:11px;cursor:pointer;font-family:Montserrat,sans-serif;font-weight:700">Tentar novamente</button></div>';
          cardBrickCtrl=null;
          var btn=document.getElementById('btnPagar');
          if(btn){btn.disabled=false;btn.classList.remove('loading');}
        }
      }
    });
  }catch(e){
    console.warn('[cardBrick]',e.message);
    showToast('Erro ao carregar formulário. Tente usar o Pix.');
    cardBrickCtrl=null;
  }
}

/* ── PAGAR ── */
async function pagar() {
  var btn = document.getElementById('btnPagar');
  btn.disabled = true; btn.classList.add('loading');

  if(metodoSelecionado === 'cartao'){
    if(!cardBrickCtrl){
      showToast('Aguarde o formulário de cartão carregar.');
      btn.disabled=false; btn.classList.remove('loading'); return;
    }
    try{ await cardBrickCtrl.submit(); }
    catch(e){
      showToast('Preencha todos os dados do cartão.');
      btn.disabled=false; btn.classList.remove('loading');
    }
    return;
  }


/* ── Credita pacote MP comprado com cartão (approved imediato) ──
   Executa 1 SELECT + 1 UPSERT por tabela — sem sobrecarga.
   Idempotência via sessionStorage evita duplo crédito em retry. ── */
async function creditarPacoteMPCartao(session) {
  const pkgId  = sessionStorage.getItem('mg_loja_pkg_id')    || '';
  const pkgMP  = parseInt(sessionStorage.getItem('mg_loja_pkg_mp') || '0');
  const itensRaw = sessionStorage.getItem('mg_itens_pendentes') || '[]';

  // Só executa se for compra de pacote MP
  let itens = [];
  try { itens = JSON.parse(itensRaw); } catch(e) {}
  if (!itens.length || itens[0].tipo !== 'marspoints') return false;

  // Idempotência
  if (sessionStorage.getItem('mg_loja_creditado_cartao')) return true;
  sessionStorage.setItem('mg_loja_creditado_cartao', '1');

  const email = session.user.email;
  const token = session.access_token;
  const SUPA_URL_C = SUPABASE_URL;
  const SUPA_KEY_C = SUPABASE_KEY;

  // Lê bonus: primeiro mg_loja_pkg_bonus, fallback para itens[0].bonus
  let bonus = [];
  try {
    const bonusRaw = sessionStorage.getItem('mg_loja_pkg_bonus') || '[]';
    bonus = JSON.parse(bonusRaw);
  } catch(e) {}
  if (!bonus.length && itens[0] && Array.isArray(itens[0].bonus)) bonus = itens[0].bonus;

  console.log('[creditarPacoteMPCartao] pkgId:', pkgId, '| pkgMP:', pkgMP, '| bonus:', JSON.stringify(bonus));

  const headers = {
    'apikey': SUPA_KEY_C,
    'Authorization': `Bearer ${token}`,
    'Content-Type': 'application/json',
    'Accept': 'application/json'
  };

  let tktCreditado = 0, xpCreditado = 0;
  const erros = [];

  // ── 1. MarsPoints ──
  try {
    const mpRes  = await fetch(`${SUPA_URL_C}/rest/v1/marspoints?user_email=eq.${encodeURIComponent(email)}&limit=1`, { headers });
    if (!mpRes.ok) throw new Error(`MP SELECT ${mpRes.status}`);
    const mpRows = await mpRes.json();
    const mpAtual = (mpRows[0] && mpRows[0].pontos)    || 0;
    const hist    = (mpRows[0] && mpRows[0].historico) || [];
    hist.unshift({ pontos: pkgMP, descricao: 'Compra pacote MP (cartão): ' + pkgId, data: new Date().toISOString(), tipo: 'compra_mp' });
    const mpWrite = await fetch(`${SUPA_URL_C}/rest/v1/marspoints`, {
      method: 'POST',
      headers: { ...headers, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ user_email: email, pontos: mpAtual + pkgMP, historico: hist.slice(0, 50) })
    });
    if (!mpWrite.ok) throw new Error(`MP WRITE ${mpWrite.status}: ${(await mpWrite.text()).slice(0,100)}`);
    console.log('[MP cartão] ✅ +' + pkgMP);
  } catch(e) { console.error('[MP cartão ERRO]', e.message); erros.push(e.message); }

  // ── 2. Tickets bônus ──
  try {
    const tktBonus = bonus
      .filter(b => b.type === 'tkt')
      .reduce((s, b) => { const m = (b.label || '').match(/\d+/); return s + (m ? parseInt(m[0]) : 0); }, 0);
    if (tktBonus > 0) {
      const tktGet = await fetch(`${SUPA_URL_C}/rest/v1/tickets?user_email=eq.${encodeURIComponent(email)}&limit=1`, { headers });
      if (!tktGet.ok) throw new Error(`TKT SELECT ${tktGet.status}`);
      const tktRows = await tktGet.json();
      const tktAtual = (tktRows[0] && tktRows[0].quantidade)      || 0;
      const tktTotal = (tktRows[0] && tktRows[0].total_acumulado) || 0;
      const tktPayload = { user_email: email, quantidade: tktAtual + tktBonus, total_acumulado: tktTotal + tktBonus };
      if (!tktRows[0]) tktPayload.ultima_renovacao = new Date().toISOString();
      const tktWrite = await fetch(`${SUPA_URL_C}/rest/v1/tickets`, {
        method: 'POST',
        headers: { ...headers, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify(tktPayload)
      });
      if (!tktWrite.ok) throw new Error(`TKT WRITE ${tktWrite.status}: ${(await tktWrite.text()).slice(0,100)}`);
      tktCreditado = tktBonus;
      console.log('[Tickets cartão] ✅ +' + tktBonus);
    }
  } catch(e) { console.error('[TICKETS cartão ERRO]', e.message); erros.push(e.message); }

  // ── 3. XP Planeta ──
  try {
    const xpBonus = bonus
      .filter(b => b.type === 'xp')
      .reduce((s, b) => { const m = (b.label || '').match(/\d+/); return s + (m ? parseInt(m[0]) : 0); }, 0);
    if (xpBonus > 0) {
      const plGet = await fetch(`${SUPA_URL_C}/rest/v1/planetas?user_email=eq.${encodeURIComponent(email)}&limit=1`, { headers });
      if (!plGet.ok) throw new Error(`XP SELECT ${plGet.status}`);
      const plRows = await plGet.json();
      const xpAtual = (plRows[0] && plRows[0].xp)  || 0;
      const pLog    = (plRows[0] && plRows[0].log)  || [];
      pLog.unshift({ label: 'Bônus XP pacote ' + pkgId + ' (cartão)', xp: xpBonus, icon: '🌟', t: new Date().toLocaleTimeString('pt-BR') });
      const plWrite = await fetch(`${SUPA_URL_C}/rest/v1/planetas`, {
        method: 'POST',
        headers: { ...headers, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify({ user_email: email, xp: xpAtual + xpBonus, log: pLog.slice(0, 20), updated_at: new Date().toISOString() })
      });
      if (!plWrite.ok) throw new Error(`XP WRITE ${plWrite.status}: ${(await plWrite.text()).slice(0,100)}`);
      xpCreditado = xpBonus;
      console.log('[XP cartão] ✅ +' + xpBonus);
    }
  } catch(e) { console.error('[XP cartão ERRO]', e.message); erros.push(e.message); }

  // Fallback: se alguma etapa falhou, perfil.html retenta
  if (erros.length > 0) {
    console.warn('[creditarPacoteMPCartao] erros:', erros);
    sessionStorage.setItem('mg_loja_pago', 'sim');
  }

  // Limpa sessão
  ['mg_loja_pkg_id','mg_loja_pkg_mp','mg_loja_pkg_bonus','mg_itens_pendentes','mg_loja_creditado_cartao'].forEach(k => sessionStorage.removeItem(k));

  return erros.length === 0;
}

  /* PIX */
  try {
    var r = await sb.auth.getSession();
    if (!r.data||!r.data.session) {
      showToast('Faça login para finalizar a compra!');
      setTimeout(() => window.location.href = 'perfil.html', 1200);
      btn.disabled=false; btn.classList.remove('loading'); return;
    }
    var session = r.data.session;
    var itensComDesconto = itens.map(p=>({...p, currency_id:'BRL'}));
    /* Aplica desconto no item mais barato */
    if(cupomAtual){
      var precos = itensComDesconto.map(p=>Number(p.preco));
      var menor = Math.min(...precos);
      var idxMenor = precos.indexOf(menor);
      var desc = calcularDesconto();
      itensComDesconto[idxMenor] = {...itensComDesconto[idxMenor], preco: Math.max(0, Number(itensComDesconto[idxMenor].preco)-desc)};
    }
    var response = await fetch(SUPABASE_URL+'/functions/v1/mp-criar-pix', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
      body: JSON.stringify({ itens: itensComDesconto, cupom: cupomAtual||null })
    });
    var data = await response.json();
    if (!response.ok) throw new Error(data.error || 'Erro ao gerar Pix');

    sessionStorage.setItem('mg_pix_data',     JSON.stringify(data));
    sessionStorage.setItem('mg_external_ref',  data.reference  || '');
    sessionStorage.setItem('mg_pedido_id',     data.pedido_id  || '');
    sessionStorage.setItem('mg_user_email',    session.user.email || '');
    sessionStorage.setItem('mg_user_id',       session.user.id || '');
    sessionStorage.setItem('mg_access_token',  session.access_token  || '');
    sessionStorage.setItem('mg_refresh_token', session.refresh_token || '');
    window.location.href = 'pix-checkout.html';
  } catch (error) {
    showToast('Erro: ' + (error.message || 'Tente novamente'));
    btn.disabled=false; btn.classList.remove('loading');
  }
}

/* ── PAGAR CARTÃO (callback do Brick) ── */
async function pagarCartao(cardData){
  var btn = document.getElementById('btnPagar');
  btn.disabled=true; btn.classList.add('loading');
  try{
    var r = await sb.auth.getSession();
    if(!r.data||!r.data.session){
      showToast('Sessão expirada. Faça login novamente.');
      btn.disabled=false; btn.classList.remove('loading');
      setTimeout(()=>window.location.href='perfil.html',1500);
      return;
    }
    var session = r.data.session;

    /* Aplica desconto nos itens igual ao fluxo do Pix */
    var itensComDesconto = itens.map(p=>({...p, currency_id:'BRL'}));
    if(cupomAtual){
      var precos = itensComDesconto.map(p=>Number(p.preco));
      var menor = Math.min(...precos);
      var idxMenor = precos.indexOf(menor);
      var desc = calcularDesconto();
      itensComDesconto[idxMenor] = {...itensComDesconto[idxMenor], preco: Math.max(0, Number(itensComDesconto[idxMenor].preco)-desc)};
    }

    var response = await fetch(SUPABASE_URL+'/functions/v1/mp-criar-cartao', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
      body: JSON.stringify({ itens: itensComDesconto, cardData, cupom: cupomAtual||null, total: getTotal() })
    });
    var data = await response.json();
    if(!response.ok) throw new Error(data.error||'Erro no pagamento com cartão');
    if(data.status==='approved'){
      sessionStorage.setItem('mg_pedido_id', data.pedido_id||'');
      sessionStorage.setItem('mg_user_email', session.user.email||'');
      // Se for compra de pacote MP com cartão, credita antes de redirecionar
      const _itensCheck = JSON.parse(sessionStorage.getItem('mg_itens_pendentes') || '[]');
      if (_itensCheck.length && _itensCheck[0].tipo === 'marspoints') {
        showToast('✅ Pagamento aprovado! Creditando...');
        await creditarPacoteMPCartao(session).catch(e => {
          console.error('[cartao MP]', e);
          sessionStorage.setItem('mg_loja_pago', 'sim'); // fallback via perfil.html
        });
        window.location.href = 'perfil.html#loja-mp';
      } else {
        window.location.href = 'sucesso.html';
      }
    } else if(data.status==='pending'||data.status==='in_process'){
      showToast('Pagamento em análise — você receberá confirmação por email.');
      setTimeout(()=>window.location.href='index.html',3000);
    } else {
      var msgs={
        'cc_rejected_bad_filled_card_number':'Número do cartão incorreto.',
        'cc_rejected_bad_filled_date':'Data de validade incorreta.',
        'cc_rejected_bad_filled_security_code':'CVV incorreto.',
        'cc_rejected_bad_filled_other':'Dados do cartão incorretos.',
        'cc_rejected_insufficient_amount':'Saldo insuficiente no cartão.',
        'cc_rejected_high_risk':'Cartão recusado por segurança. Tente outro.',
        'cc_rejected_call_for_authorize':'Ligue para o banco para autorizar.',
        'cc_rejected_card_disabled':'Cartão desabilitado. Contate seu banco.',
        'cc_rejected_duplicated_payment':'Pagamento duplicado detectado.'
      };
      var msg=msgs[data.status_detail]||data.status_detail||'Cartão recusado. Verifique os dados e tente novamente.';
      throw new Error(msg);
    }
  }catch(err){
    showToast('❌ '+(err.message||'Tente novamente'));
    btn.disabled=false; btn.classList.remove('loading');
  }
}

/* Pré-carrega cupom do sessionStorage se veio de outra página */
renderResumo();
</script>
